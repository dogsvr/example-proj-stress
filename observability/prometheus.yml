# Prometheus scrape configuration for dogsvr-org stress test environment.
#
# Scrapes /metrics from:
#   - dir   (main thread + 2 workers)
#   - zonesvr (main thread + 2 workers)
#   - battlesvr (main thread + 1 worker)
#   - stress bots (when running)
#
# Mounted into the grafana/otel-lgtm container as /otel-lgtm/prometheus.yaml.
# When run with `--network=host`, 127.0.0.1:91xx targets reach host services
# directly. Retention is bounded by Prometheus defaults inside the container.

global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  # ---- dir process ----
  - job_name: 'dogsvr-dir-main'
    scrape_interval: 5s
    static_configs:
      - targets: ['127.0.0.1:9101']
        labels:
          svr: 'dir'
          role: 'main'
  - job_name: 'dogsvr-dir-worker'
    scrape_interval: 5s
    static_configs:
      # Worker port = portBase + node:worker_threads.threadId. dir runs log.mode="inline",
      # so business workers get threadId 1, 2 → 9112, 9113 (portBase=9111).
      - targets: ['127.0.0.1:9112', '127.0.0.1:9113']
        labels:
          svr: 'dir'
          role: 'worker'

  # ---- zonesvr process ----
  - job_name: 'dogsvr-zonesvr-main'
    scrape_interval: 5s
    static_configs:
      - targets: ['127.0.0.1:9102']
        labels:
          svr: 'zonesvr'
          role: 'main'
  - job_name: 'dogsvr-zonesvr-worker'
    scrape_interval: 5s
    static_configs:
      # zonesvr runs log.mode="central": @dogsvr/logger spawns a central log Worker
      # that takes threadId 1, so the two business workers get threadId 2, 3
      # → 9123, 9124 (portBase=9121). See RUNBOOK.md "Known issue: central log mode
      # shifts worker /metrics ports".
      - targets: ['127.0.0.1:9123', '127.0.0.1:9124']
        labels:
          svr: 'zonesvr'
          role: 'worker'

  # ---- battlesvr process ----
  - job_name: 'dogsvr-battlesvr-main'
    scrape_interval: 2s   # tick metrics need finer resolution
    static_configs:
      - targets: ['127.0.0.1:9103']
        labels:
          svr: 'battlesvr'
          role: 'main'
  - job_name: 'dogsvr-battlesvr-worker'
    scrape_interval: 2s
    static_configs:
      # battlesvr also runs log.mode="central"; sole business worker gets threadId 2
      # → 9133 (portBase=9131). Same caveat as zonesvr.
      - targets: ['127.0.0.1:9133']
        labels:
          svr: 'battlesvr'
          role: 'worker'

  # ---- Stress bot client metrics (only present when bots are running) ----
  - job_name: 'stress-bots'
    scrape_interval: 5s
    static_configs:
      - targets: ['127.0.0.1:9201']
        labels:
          role: 'bot'
